global:
  scrape_interval: 5s
  evaluation_interval: 15s
  external_labels:
    federation: "tip-local"

scrape_configs:
  - job_name: "tip-federation"
    metrics_path: /metrics
    # honor_labels: true means the metric's own labels win when they conflict
    # with target labels. The TIP node injects a `node` label derived from
    # its actual TIP node id, so dashboards group by real identity instead
    # of port-based synthetic labels.
    honor_labels: true
    # Targets are generated at container startup from the TIP_NODE_TARGETS
    # env var (comma-separated `host:port` list) in `.env`. file_sd_configs
    # re-reads the file on a 30s interval so adding a node only requires
    # editing .env and restarting the prometheus container — no manual
    # edit of this file. See README.md "Prometheus targets" for details.
    file_sd_configs:
      - files:
          - /etc/prometheus/tip-targets.json
        refresh_interval: 30s

  - job_name: "prometheus"
    static_configs:
      - targets: [ "localhost:9090" ]
