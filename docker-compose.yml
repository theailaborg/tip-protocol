# TIP Protocol -- Docker Compose Stack
#
# Spins up the complete TIP Protocol node stack:
#   - tip-node:     Node.js full node (REST API + DAG + gossip + scoring)
#   - postgres:     PostgreSQL database (production-grade DAG storage)
#   - redis:        (optional) Rate limit and session cache
#
# Quick start (development):
#   docker compose up
#
# Quick start (production):
#   cp .env.example .env
#   # Edit .env: set TIP_JWT_SECRET, TIP_ADMIN_API_KEY, TIP_CHAIN_ID, etc.
#   docker compose -f docker-compose.yml up -d
#
# Seed the genesis block (run once on first launch):
#   docker compose exec tip-node node scripts/seed.js
#
# View logs:
#   docker compose logs -f tip-node
#
# Author: Dinesh Mendhe <chairman@theailab.org>
# Copyright 2026 The AI Lab Intelligence Unobscured, Inc.
# Licensed under TIPCL-1.0

version: "3.9"

# ── Shared configuration ───────────────────────────────────────────────────────
x-tip-common: &tip-common
  restart: unless-stopped
  networks:
    - tip-internal

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── TIP Protocol Node (Node.js) ─────────────────────────────────────────────
  tip-node:
    <<: *tip-common
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: tip-protocol/node:2.0.0
    container_name: tip-node
    ports:
      - "${TIP_API_PORT:-4000}:4000"       # REST API
      - "${TIP_GOSSIP_PORT:-4001}:4001"    # Gossip / P2P
    volumes:
      - tip-data:/app/data                 # Persistent DAG storage
    environment:
      NODE_ENV:               ${NODE_ENV:-production}
      PORT:                   4000
      TIP_JWT_SECRET:         ${TIP_JWT_SECRET}
      TIP_ADMIN_API_KEY:      ${TIP_ADMIN_API_KEY}
      TIP_GENESIS_HASH:       ${TIP_GENESIS_HASH}
      TIP_CHAIN_ID:           ${TIP_CHAIN_ID:-tip-mainnet-v2}
      TIP_BOOTSTRAP_PEERS:    ${TIP_BOOTSTRAP_PEERS:-}
      TIP_CORS_ORIGINS:       ${TIP_CORS_ORIGINS:-*}
      TIP_LOG_LEVEL:          ${TIP_LOG_LEVEL:-info}
      TIP_LOG_FORMAT:         ${TIP_LOG_FORMAT:-json}
      TIP_PRESCAN_MODE:       ${TIP_PRESCAN_MODE:-stub}
      TIP_PRESCAN_API_URL:    ${TIP_PRESCAN_API_URL:-}
      TIP_PRESCAN_API_KEY:    ${TIP_PRESCAN_API_KEY:-}
      TIP_VP_MODE:            ${TIP_VP_MODE:-false}
      TIP_VP_ID:              ${TIP_VP_ID:-}
      TIP_NODE_TYPE:          ${TIP_NODE_TYPE:-full}
      TIP_RATE_LIMIT_PUBLIC:  ${TIP_RATE_LIMIT_PUBLIC:-100}
      TIP_RATE_LIMIT_ADMIN:   ${TIP_RATE_LIMIT_ADMIN:-20}
      TIP_DB_PATH:            /app/data/tip_node.db
      TIP_DATA_DIR:           /app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries:  3
      start_period: 20s
    labels:
      com.theailab.service:     "tip-protocol-node"
      com.theailab.version:     "2.0.0"
      com.theailab.maintainer:  "chairman@theailab.org"

  # ── PostgreSQL (production DAG storage) ──────────────────────────────────────
  postgres:
    <<: *tip-common
    image: postgres:16-alpine
    container_name: tip-postgres
    ports:
      - "127.0.0.1:5432:5432"             # bind to localhost only
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-tip_protocol}
      POSTGRES_USER:     ${POSTGRES_USER:-tip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tip}"]
      interval: 10s
      timeout:  5s
      retries:  5
    labels:
      com.theailab.service: "tip-protocol-postgres"

  # ── Redis (optional: rate limiting and gossip peer cache) ────────────────────
  redis:
    <<: *tip-common
    image: redis:7-alpine
    container_name: tip-redis
    ports:
      - "127.0.0.1:6379:6379"             # bind to localhost only
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    labels:
      com.theailab.service: "tip-protocol-redis"
    profiles:
      - redis                              # opt-in: docker compose --profile redis up

# ── Named volumes (persist data across restarts) ──────────────────────────────
volumes:
  tip-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ── Internal network (containers talk to each other, not the internet) ────────
networks:
  tip-internal:
    driver: bridge
