# TIP Protocol - Docker Compose
#
# Single command brings up the founding node + (optionally) a database,
# selected via Compose profile. The node container is identical for every
# DB; selection is purely runtime via DB_DRIVER + connection vars in .env.
#
# ── Quick start ──────────────────────────────────────────────────────────────
#
#   npm run seed                                  # once, before first launch
#
#   docker compose up -d                          # PostgreSQL (default, see below)
#   docker compose logs -f tip-node               # tail logs
#   docker compose down                           # stop (keep volumes)
#   docker compose down -v                        # stop + wipe DB volumes
#
# ── Picking a different database engine ─────────────────────────────────────
#
# Postgres always starts (the prod default); DB_DRIVER in .env is the single
# knob for what the NODE connects to. Other engines are opt-in via --profile
# (postgres then starts but idles):
#
#   DB_DRIVER=postgres (default)   docker compose up -d
#   DB_DRIVER=mariadb              docker compose --profile mariadb up -d
#   DB_DRIVER=mssql                docker compose --profile mssql up -d
#   DB_DRIVER=oracle               docker compose --profile oracle up -d
#   DB_DRIVER=sqlite               docker compose up -d   (node uses the local file)
#
# Set the matching DB_HOST in .env too (postgres / mariadb / mssql / oracle).
#
# Genesis state is bootstrapped from genesis.js on first boot; no seed.db
# is shipped or copied. The runtime _writeGenesisBlock walks the founding
# values embedded in genesis.js and creates the matching DAG state.
#
# ── .env ─────────────────────────────────────────────────────────────────────
#
# All node + DB credentials come from .env at the repo root. Set these:
#
#   DB_DRIVER=postgres                            # or mariadb/mssql/oracle/sqlite
#   DB_HOST=postgres                              # MUST match service name below
#   DB_PORT=5432                                  # leave blank for driver default
#   DB_NAME=tip_protocol
#   DB_USER=tip
#   DB_PASSWORD=<strong>
#
# DB_HOST values when running in this stack: postgres / mariadb / mssql /
# oracle (Compose service names). Use localhost only when running the node
# OUTSIDE Docker (native node process) against a host-side DB.
#
# Author: Dinesh Mendhe <chairman@theailab.org>
# Copyright 2026 The AI Lab Intelligence Unobscured, Inc.
# Licensed under TIPCL-1.0

# ─────────────────────────────────────────────────────────────────────────────
# Reusable node config: same image, env, volumes for every DB profile.
# Anchored YAML alias keeps the file DRY.
# ─────────────────────────────────────────────────────────────────────────────
x-node-common: &node-common
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  image: tip-protocol/node:2.0.0
  container_name: tip-node
  restart: unless-stopped
  # Match the in-process shutdown timeout (65s: classifier text timeout +
  # buffer) so SIGTERM grace covers worst-case prescan worker drain. Without
  # this, docker SIGKILLs at 10s and prescan claims become orphaned (queue
  # safety net recovers them, but adds latency).
  stop_grace_period: 70s
  ports:
    - "${PORT:-4000}:${PORT:-4000}"
    - "${TIP_P2P_PORT:-4001}:${TIP_P2P_PORT:-4001}"
  volumes:
    - ./data:/app/data
    # Host log dir mounted at the container's TIP_LOG_DIR (from .env).
    - ./logs/node-1:/app/node/logs
    # Node keypair (.tip.json) read via TIP_NODE_CREDENTIALS_FILE from .env.
    - ./genesis-data/backups:/app/genesis-data/backups:ro
  # Make `host.docker.internal` resolvable inside the container on every
  # Docker setup (Docker Desktop on macOS/Windows already provides it; Linux
  # daemons do not without this hint). The domain-binding verifier's dev-only
  # loopback fallback dials it when a bound localhost domain is unreachable
  # from inside the container. Harmless in production (NODE_ENV is the gate).
  extra_hosts:
    - "host.docker.internal:host-gateway"
  # All node config comes from the env_file: identity, keys, ports, DB,
  # classifier, media, dev flags. WORKDIR is /app, so the relative data/log
  # paths in .env resolve onto the volume mounts above.
  env_file: .env
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT:-4000}/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 20s
  # networks:
  #   - tip-vp-with-mobile-web-app_default  # uncomment for VP-stack integration

services:

  # Always starts. With DB_DRIVER=sqlite the node falls back to the on-disk
  # file at /app/data/tip.db (postgres starts but idles).
  tip-node:
    <<: *node-common
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
      mssql:
        condition: service_healthy
        required: false
      oracle:
        condition: service_healthy
        required: false

  # ── PostgreSQL (always starts, the prod default) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-tip}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB:       ${DB_NAME:-tip_protocol}
    ports:
      # Bind to localhost only; don't expose Postgres publicly.
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tip} -d ${DB_NAME:-tip_protocol}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── MariaDB / MySQL ──────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: tip-mariadb
    profiles: ["mariadb"]
    restart: unless-stopped
    environment:
      MARIADB_USER:           ${DB_USER:-tip}
      MARIADB_PASSWORD:       ${DB_PASSWORD:-secret}
      MARIADB_DATABASE:       ${DB_NAME:-tip_protocol}
      MARIADB_ROOT_PASSWORD:  ${DB_PASSWORD:-secret}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # ── SQL Server 2022 ──────────────────────────────────────────────────────
  # Note: SA password must meet SQL Server complexity rules: uppercase +
  # lowercase + digit + symbol, min 8 chars. Avoid '#' in .env (parsed as
  # comment). The default DB_PASSWORD fallback below already meets the rule.
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tip-mssql
    profiles: ["mssql"]
    restart: unless-stopped
    environment:
      ACCEPT_EULA:        "Y"
      MSSQL_SA_PASSWORD:  ${DB_PASSWORD:-StrongPass123!}
      MSSQL_PID:          "Developer"
    ports:
      - "127.0.0.1:${DB_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Oracle Database 23ai (Free) ──────────────────────────────────────────
  # Cold start takes ~2 minutes; the start_period reflects that. After first
  # start, multi-node schemas can be created via `docker exec tip-oracle
  # sqlplus sys/${DB_PASSWORD}@//localhost:1521/FREEPDB1 as sysdba`.
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: tip-oracle
    profiles: ["oracle"]
    restart: unless-stopped
    environment:
      ORACLE_PWD:           ${DB_PASSWORD:-secret}
      ORACLE_CHARACTERSET:  AL32UTF8
    ports:
      - "127.0.0.1:${DB_PORT:-1521}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "/opt/oracle/checkDBStatus.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  postgres-data:
  mariadb-data:
  mssql-data:
  oracle-data:

# networks:
#   tip-vp-with-mobile-web-app_default:
#     external: true  # created by the VP docker-compose
#
# Uncomment the two blocks above (this one + the `networks:` line under
# x-node-common) to integrate with the VP-with-mobile-web-app compose stack
# (cloudflared tunnel reaches the node via the shared network).
# Default is standalone; Compose's default bridge network is sufficient.
