# TIP Protocol -- Docker Compose
#
# Quick start:
#   npm run seed          # run once before first launch
#   docker compose up
#
# View logs:
#   docker compose logs -f tip-node
#
# Author: Dinesh Mendhe <chairman@theailab.org>
# Copyright 2026 The AI Lab Intelligence Unobscured, Inc.
# Licensed under TIPCL-1.0

services:
  tip-node:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: tip-protocol/node:2.2.0
    container_name: tip-node
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - tip-data:/app/data
    environment:
      NODE_ENV:              ${NODE_ENV:-production}
      PORT:                  4000
      HOST:                  0.0.0.0
      TIP_NODE_ID:           ${TIP_NODE_ID:-}
      TIP_NODE_TYPE:         ${TIP_NODE_TYPE:-full}
      TIP_REGION:            ${TIP_REGION:-US}
      TIP_NODE_PRIVATE_KEY:  ${TIP_NODE_PRIVATE_KEY}
      TIP_NODE_PUBLIC_KEY:   ${TIP_NODE_PUBLIC_KEY}
      TIP_PEERS:             ${TIP_PEERS:-}
      TIP_CORS_ORIGINS:      ${TIP_CORS_ORIGINS:-*}
      TIP_LOG_LEVEL:         ${TIP_LOG_LEVEL:-info}
      TIP_DB_PATH:           /app/data/tip.db
      TIP_DATA_DIR:          /app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      com.theailab.service:    "tip-protocol-node"
      com.theailab.version:    "2.2.0"

volumes:
  tip-data:
    driver: local
